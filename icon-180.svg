<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Gold Triangle Background -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A335;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E6B84D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9F43;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Triangle -->
  <polygon points="90,10 170,160 10,160" fill="url(#goldGradient)"/>
  
  <!-- White Inner Background -->
  <polygon points="90,35 155,145 25,145" fill="white"/>
  
  <!-- Inner Gold Triangle with gradient lines -->
  <g fill="none" stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round">
    <!-- Top point -->
    <line x1="90" y1="45" x2="90" y2="75"/>
    
    <!-- Upper left diagonal lines -->
    <line x1="75" y1="55" x2="75" y2="85"/>
    <line x1="60" y1="65" x2="60" y2="95"/>
    <line x1="45" y1="75" x2="45" y2="105"/>
    
    <!-- Upper right diagonal lines -->
    <line x1="105" y1="55" x2="105" y2="85"/>
    <line x1="120" y1="65" x2="120" y2="95"/>
    <line x1="135" y1="75" x2="135" y2="105"/>
    
    <!-- Bottom horizontal lines -->
    <line x1="50" y1="115" x2="130" y2="115"/>
    <line x1="55" y1="130" x2="125" y2="130"/>
  </g>
  
  <!-- Solid gradient triangle in center -->
  <polygon points="90,50 130,120 50,120" fill="url(#goldGradient)" opacity="0.3"/>
</svg>