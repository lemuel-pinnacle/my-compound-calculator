<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Compound Calculator">
<link rel="apple-touch-icon" href="icon-180.png">

<title>My Compound Calculator</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:-apple-system,BlinkMacSystemFont,
"SF Pro Display",
"Segoe UI",
Roboto,
sans-serif;

background:#f5f6f7;

display:flex;

justify-content:center;

padding:25px;
}

.container{

width:100%;

max-width:700px;

background:white;

border-radius:32px;

padding:30px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

}

.icon{

font-size:58px;

text-align:center;

margin-bottom:10px;
}

h1{

font-size:3rem;

font-weight:800;

text-align:center;

color:#111827;
}

.subtitle{

text-align:center;

color:#6b7280;

font-size:1.2rem;

margin-top:10px;

margin-bottom:35px;
}

label{

display:block;

font-size:1.3rem;

font-weight:700;

margin-bottom:10px;
}

input{

width:100%;

padding:18px;

font-size:1.4rem;

border:2px solid #d8e8dd;

border-radius:18px;

outline:none;

margin-bottom:25px;
}

input:focus{

border-color:#0b7a35;
}

.info{

background:#eef7f2;

padding:18px;

border-radius:18px;

font-size:1.1rem;

font-weight:700;

color:#0b7a35;

margin-bottom:25px;
}

button{

width:100%;

padding:18px;

font-size:1.25rem;

font-weight:700;

border:none;

border-radius:18px;

background:#0b7a35;

color:white;

cursor:pointer;
}

button:hover{

opacity:.92;
}

h2{

margin-top:35px;

margin-bottom:20px;

font-size:2rem;
}

table{

width:100%;

border-collapse:collapse;

overflow:hidden;

border-radius:18px;
}

thead{

background:#eef7f2;
}

th{

padding:18px;

text-align:left;

font-size:1.2rem;
}

td{

padding:18px;

border-bottom:1px solid #e5e7eb;

font-size:1.15rem;
}

td:last-child{

text-align:right;

font-weight:800;

color:#0b7a35;
}

.footer{

margin-top:25px;

color:#6b7280;

font-size:0.95rem;
}

@media(max-width:768px){

.container{

padding:22px;

max-width:500px;
}

h1{

font-size:2.4rem;
}

.subtitle{

font-size:1rem;
}

}

</style>

</head>

<body>

<div class="container">

<div class="icon">

📈

</div>

<h1>

My Compound Calculator

</h1>

<div class="subtitle">

Calculate your investment growth with compound interest

</div>

<label>

Initial Investment

</label>

<input

id="principal"

type="number"

value="0"

placeholder="$0"

>

<div class="info">

📊 APR: 42.12%

<br><br>

🕒 Compound Frequency: Monthly (12 times per year)

</div>

<button onclick="calculateGrowth()">

Calculate

</button>

<h2>

📅 Investment Growth

</h2>

<table>

<thead>

<tr>

<th>

Month

</th>

<th>

Amount

</th>

</tr>

</thead>

<tbody id="results">

</tbody>

</table>

<div class="footer">

🛡️ Results are estimates and for informational purposes only.

</div>

</div>

<script>

function calculateGrowth(){

const principal =

parseFloat(

document.getElementById(

'principal'

).value

) || 0;

const apr = 42.12/100;

const months = [6,12,18,24,30,36];

let rows = '';

months.forEach(function(month){

const amount =

principal *

Math.pow(

1 + apr/12,

month

);

rows +=

'<tr>' +

'<td>'+month+'</td>' +

'<td>$'+

amount.toLocaleString(

undefined,

{

minimumFractionDigits:2,

maximumFractionDigits:2

}

)

+'</td>' +

'</tr>';

});

document.getElementById(

'results'

).innerHTML = rows;

}

calculateGrowth();

</script>

</body>

</html>
