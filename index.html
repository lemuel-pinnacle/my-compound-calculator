<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Compound Calculator">
    <title>Compound Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .calculate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }
        
        .calculate-btn:active {
            transform: scale(0.98);
        }
        
        .reset-btn {
            background: #f0f0f0;
            color: #333;
        }
        
        .reset-btn:active {
            background: #e0e0e0;
        }
        
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .result-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .result-value {
            color: #667eea;
            font-size: 24px;
            font-weight: 700;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Compound Interest</h1>
        
        <div class="input-group">
            <label for="principal">Principal Amount ($)</label>
            <input type="number" id="principal" placeholder="Enter amount" min="0" step="0.01">
        </div>
        
        <div class="input-group">
            <label for="rate">Annual Interest Rate (%)</label>
            <input type="number" id="rate" placeholder="Enter rate" min="0" step="0.01">
        </div>
        
        <div class="input-group">
            <label for="time">Time Period (Years)</label>
            <input type="number" id="time" placeholder="Enter years" min="0" step="0.1">
        </div>
        
        <div class="input-group">
            <label for="compounds">Compounds Per Year</label>
            <select id="compounds">
                <option value="1">Annually</option>
                <option value="2">Semi-Annually</option>
                <option value="4">Quarterly</option>
                <option value="12" selected>Monthly</option>
                <option value="365">Daily</option>
            </select>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="button-group">
            <button class="reset-btn" onclick="resetForm()">Clear</button>
            <button class="calculate-btn" onclick="calculate()">Calculate</button>
        </div>
        
        <div class="results" id="results">
            <div class="result-item">
                <div class="result-label">Final Amount</div>
                <div class="result-value" id="finalAmount">$0.00</div>
            </div>
            <div class="result-item">
                <div class="result-label">Total Interest Earned</div>
                <div class="result-value" id="totalInterest">$0.00</div>
            </div>
            <div class="result-item">
                <div class="result-label">Return on Investment</div>
                <div class="result-value" id="roi">0.00%</div>
            </div>
        </div>
    </div>
    
    <script>
        function calculate() {
            const principal = parseFloat(document.getElementById('principal').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const time = parseFloat(document.getElementById('time').value);
            const compounds = parseInt(document.getElementById('compounds').value);
            const errorDiv = document.getElementById('error');
            
            errorDiv.classList.remove('show');
            
            // Validation
            if (!principal || principal <= 0) {
                errorDiv.textContent = '❌ Please enter a valid principal amount';
                errorDiv.classList.add('show');
                return;
            }
            if (!rate || rate < 0) {
                errorDiv.textContent = '❌ Please enter a valid interest rate';
                errorDiv.classList.add('show');
                return;
            }
            if (!time || time <= 0) {
                errorDiv.textContent = '❌ Please enter a valid time period';
                errorDiv.classList.add('show');
                return;
            }
            
            // Formula: A = P(1 + r/n)^(nt)
            const r = rate / 100;
            const finalAmount = principal * Math.pow(1 + r / compounds, compounds * time);
            const totalInterest = finalAmount - principal;
            const roi = (totalInterest / principal) * 100;
            
            // Display results
            document.getElementById('finalAmount').textContent = '$' + finalAmount.toFixed(2);
            document.getElementById('totalInterest').textContent = '$' + totalInterest.toFixed(2);
            document.getElementById('roi').textContent = roi.toFixed(2) + '%';
            document.getElementById('results').classList.add('show');
        }
        
        function resetForm() {
            document.getElementById('principal').value = '';
            document.getElementById('rate').value = '';
            document.getElementById('time').value = '';
            document.getElementById('compounds').value = '12';
            document.getElementById('results').classList.remove('show');
            document.getElementById('error').classList.remove('show');
        }
        
        // Allow Enter key to calculate
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                calculate();
            }
        });
    </script>
</body>
</html>
