<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Compound Calculator</title><style>*{box-sizing:border-box}body{margin:0;background:#f5f6f7;font-family:system-ui;padding:16px;display:flex;justify-content:center}.card{width:100%;max-width:620px;background:#fff;border-radius:28px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.08)}.icon{text-align:center;font-size:48px}h1{text-align:center}.subtitle{text-align:center;color:#667085;margin-bottom:24px}label{display:block;font-weight:700;margin:18px 0 10px}input{width:100%;padding:18px;font-size:20px;border:2px solid #d7eadf;border-radius:18px}.fixed{background:#eef7f2;padding:18px;border-radius:18px;margin:22px 0;color:#0b7a35;font-weight:700}button{width:100%;padding:18px;border:none;border-radius:18px;background:#0b7a35;color:#fff;font-size:20px;font-weight:700}table{width:100%;border-collapse:collapse}th,td{padding:16px;border-bottom:1px solid #eee}th{background:#eef7f2}td:last-child{text-align:right;color:#0b7a35;font-weight:800}</style></head><body><div class="card"><div class="icon">📈</div><h1>My Compound Calculator</h1><div class="subtitle">Calculate your investment growth with compound interest</div><label>Initial Investment</label><input id="principal" type="number" placeholder="$0"><div class="fixed">📊 APR: 42.12%<br>🕒 Monthly Compounding (12 times per year)</div><button onclick="calculate()">Calculate</button><h2>📅 Investment Growth</h2><table><thead><tr><th>Month</th><th>Amount</th></tr></thead><tbody id="results"></tbody></table></div><script>function calculate(){var P=parseFloat(document.getElementById("principal").value)||0;var months=[6,12,18,24,30,36];var r=0.4212;var rows="";for(var i=0;i<months.length;i++){var m=months[i];var a=P*Math.pow(1+r/12,m);rows+="<tr><td>"+m+"</td><td>$"+a.toFixed(2)+"</td></tr>";}document.getElementById("results").innerHTML=rows;}calculate();</script></body></html>
